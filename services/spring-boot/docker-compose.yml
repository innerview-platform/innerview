version: '3.8'

services:
  # 1. MySQL Database
  mysql:
    image: mysql:8.0
    container_name: innerview-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Atoof
      MYSQL_DATABASE: innerview_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pAtoof"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 2. Redis Engine
  redis:
    image: redis:7.2-alpine
    container_name: innerview-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # 3. DynamoDB Local
# docker-compose.yml
  dynamodb:
   image: amazon/dynamodb-local:latest
   container_name: innerview-dynamodb
   ports:
     - "8000:8000"
   command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
   healthcheck:
     test: ["CMD-SHELL", "curl -f http://localhost:8000/shell/ || exit 1"]
     interval: 10s
     timeout: 3s
     retries: 5
     start_period: 15s

volumes:
  mysql-data:
  redis-data:
  dynamodb-data: