spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # Note: MySQLDialect removed as requested by Hibernate logs (it's automatic now)

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/calendar.events # Needed for your service
              - https://www.googleapis.com/auth/calendar        # Needed for your service
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 500ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 100ms

# Custom Google API (For your second Client ID)
# Moved out of spring.security to avoid conflicts
google:
  api:
    client-id: ${GOOGLE_API_CLIENT_ID}
    client-secret: ${GOOGLE_API_CLIENT_SECRET}

# AWS Configuration (Corrected Indentation)
aws:
  region: ${DYNAMODB_REGION:us-east-1}
  access-key: "testing"
  secret-key: "testing"
  dynamodb:
    endpoint: ${DYNAMODB_ENDPOINT:http://localhost:8000}

# Server configuration
server:
  port: 8080
  error:
    include-message: always

# JWT configuration
jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 900000 # 15 mins
  refresh-token:
    expiration: 604800000 # 7 days

# Custom Application configurations
frontend:
  url: "http://localhost:3000"

interview:
  duration: 150